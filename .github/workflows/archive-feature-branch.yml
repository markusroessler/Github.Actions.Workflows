name: Archive feature branch

on:
  workflow_call:
    inputs:
      git-branch:
        required: true
        type: string
  
permissions:
  contents: write

jobs:
  archive-feature-branch:
    if: startsWith(inputs.git-branch, 'feature/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-branch }}

